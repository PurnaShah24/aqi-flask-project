{% extends "base.html" %}
{% block title %}Dashboard | AQI Analytics{% endblock %}

{% block content %}
<section class="card">
    <h2>Welcome, {{ user }}</h2>
    <p>Set analysis options and run the AQI model pipeline.</p>
</section>

<section class="card form-card">
    <h3>Run Analysis</h3>
    <form id="analysisForm" method="POST" action="{{ url_for('analyze') }}" novalidate>
        <label for="test_size">Test Size (0.1 to 0.4)</label>
        <input type="number" id="test_size" name="test_size" value="0.2" min="0.1" max="0.4" step="0.05" required>

        <label class="checkbox-line">
            <input type="checkbox" name="show_plots">
            Show matplotlib plots
        </label>

        <button class="btn primary" type="submit">Analyze Dataset</button>
    </form>
</section>
{% endblock %}
